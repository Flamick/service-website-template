<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />

		<link
			rel="preconnect"
			href="https://fonts.googleapis.com" />
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer" />

		<link
			rel="stylesheet"
			href="./css/main.css" />

		<title>Maintenance | Columbiana Ohio</title>
	</head>
	<body>
		<header class="site-header">
			<div class="site-header__container container">
				<a
					href="index.html"
					class="site-header__link">
					<div class="site-header__logo">
						<div class="site-header__logo-icon">
							<img
								src="./images/company-icon.svg"
								alt="Hvac Services Icon" />
						</div>
						<div class="site-header__logo-text"> ResolutePro </div>
					</div>
				</a>
				<a
					href="tel:+1234567890"
					class="site-header__cta btn"
					><i class="fa-solid fa-phone"></i> Call Now</a
				>
			</div>
		</header>

		<!-- footer -->
		<footer class="footer">
			<div class="footer__container container">
				<div class="footer__company-logo">
					<div class="footer__company-icon">
						<img
							src="./images/company-icon.svg"
							alt="" />
					</div>
					<div class="footer__company-name">ResolutePro Sanctuary</div>
				</div>
				<div class="footer__links">
					<a
						href="index.html"
						class="footer__link"
						>Home</a
					>
					<a
						href="index.html#services"
						class="footer__link"
						>Services</a
					>
					<a
						href="index.html#testimonials"
						class="footer__link"
						>Reviews</a
					>

					<a
						href="index.html#contact"
						class="footer__link"
						>Contact</a
					>
				</div>
				<div class="footer__divider"></div>
				<div class="footer__copyright">&copy; 2026 Resolute Sanctuary. ALl rights reserved</div>
			</div>
		</footer>

		<!-- mobile-navbar -->
		<nav class="mobile-navbar">
			<div class="mobile-navbar__container container">
				<a
					href="#hero"
					class="mobile-navbar__link">
					<div class="mobile-navbar__link-container">
						<div class="mobile-navbar__link-icon">
							<img
								src="./images/home-icon.svg"
								alt="home icon" />
						</div>
						Home
					</div>
				</a>

				<a
					href="#services"
					class="mobile-navbar__link">
					<div class="mobile-navbar__link-container">
						<div class="mobile-navbar__link-icon">
							<img
								src="./images/services-icon.svg"
								alt="home icon" />
						</div>
						Services
					</div>
				</a>

				<a
					href="#contact"
					class="mobile-navbar__link">
					<div class="mobile-navbar__link-container">
						<div class="mobile-navbar__link-icon">
							<img
								src="./images/contact-icon.svg"
								alt="home icon" />
						</div>
						Contact
					</div>
				</a>

				<a
					href="tel:+1234567890"
					class="mobile-navbar__link">
					<div class="mobile-navbar__link-container">
						<div class="mobile-navbar__link-icon">
							<img
								src="./images/call-us.svg"
								alt="home icon" />
						</div>
						Call
					</div>
				</a>
			</div>
		</nav>

		<script src="js/scroll-fade.js"></script>
	</body>
</html>
